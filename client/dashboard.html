<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeakTrace</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    rel="stylesheet"
    >


    <link href="style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <button class="btn btn-primary"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebar"
                aria-controls="sidebar">
            ☰
        </button>
        <a class="navbar-brand ms-3" href="#">LeakTrace</a>
    </div>
</nav>

<!-- Sidebar -->
<div class="offcanvas offcanvas-start bg-dark text-white"
     tabindex="-1"
     id="sidebar">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title">
            <i class="bi bi-shield-lock-fill"></i>
            <span>LeakTrace</span>
        </h5>
        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
    </div>

    <div class="offcanvas-body p-0">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#" class="nav-link active">Dashboard</a>
            </li>
            <li>
                <a href="scan.html" class="nav-link text-white">New Scan</a>
            </li>
            <li>
                <a href="analytics.html" class="nav-link text-white">Analytics</a>
            </li>
            <li>
                <a href="history.html" class="nav-link text-white">History</a>
            </li>
        </ul>
    </div>
</div>

<!-- Main Content -->
<main class="dashboard-main min-vh-100">

    <!-- Top Bar -->
    <div class="topbar px-4 py-3 d-flex justify-content-between align-items-center">
        <h6 class="mb-0">Dashboard</h6>
        <span class="small text-muted">Admin</span>
    </div>

    <!-- Content -->
    <div class="container-fluid p-4 summary-label">

        <!-- Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm summary-card">
                    <div class="card-body">
                            <div class="summary-icon icon-blue">
                             <i class="bi bi-clipboard-check"></i>
                            </div>
                        <p class="text-muted small mb-1">Total Scans</p>
                        <h4 id="totalScans">0</h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm summary-card">
                    <div class="card-body">
                        <div class="summary-icon icon-red">
                             <i class="bi bi-shield-exclamation"></i>
                        </div>
                        <p class="text-muted small mb-1">Exposed Accounts</p>
                        <h4 class="text-danger" id="totalExposed">0</h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm summary-card">
                    <div class="card-body">
                        <div class="summary-icon icon-green">
                             <i class="bi bi-shield-check"></i>
                        </div>
                        <p class="text-muted small mb-1">Safe Accounts</p>
                        <h4 class="text-success" id="totalSafe">0</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Scans -->
        <div class="card border-0 shadow-sm summary-card">
            <div class="card-body ">
                <h6 class="mb-3">
                    <i class="bi bi-clock-history"></i>
                    Recent Scans
                </h6>

                <div class="table-responsive">
                    <table class="table table-sm align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Date</th>
                            <th>File</th>
                            <th>Total</th>
                            <th>Exposed</th>
                            <th>Status</th>
                            <th>Delete</th>
                        </tr>

                        </thead>
                        <tbody id="recentScansTable">
                            
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>
</main>

<!-- Bootstrap JS (REQUIRED for offcanvas) -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>

<script src="js/dashboard.js"></script>

</body>
</html>
