<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scans</title>
    <link href="style.css" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <button class="btn btn-primary"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebar"
                aria-controls="sidebar">
                 ☰
            </button>
            <a  class="navbar-brand ms-3" href="dashboard.html">LeakTrace</a>
        </div>
    </nav>

    <!-- Sidebar -->
<div class="offcanvas offcanvas-start bg-dark text-white"
     tabindex="-1"
     id="sidebar">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title">
            <i class="bi bi-shield-lock-fill"></i>
            <span>LeakTrace</span>
        </h5>
        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
    </div>
    
    <div class="offcanvas-body p-0">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link active text-white">Dashboard</a>
            </li>
            <li>
                <a href="scan.html" class="nav-link text-white">New Scan</a>
            </li>
            <li>
                <a href="analytics.html" class="nav-link text-white">Analytics</a>
            </li>
            <li>
                <a href="history.html" class="nav-link text-white">History</a>
            </li>
        </ul>
    </div>
</div>
<br>

<div class="page-header-card post-scan-header">
    <h3>New Credential Scan</h3>
    <p> Upload employee CSV to scan for credential breaches</p>
</div>

<!-- Main Content -->

<main class="upload-main d-flex align-items-center justify-content-center">


    <div class="container mt-5" style="max-width: 600px;">
        <h5 style="color: aliceblue;">Upload you csv-format documents.</h5>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">

                
                <p class="text-muted small mb-3">
                    CSV must include an <strong>email</strong> column.
                </p>

                <div class="upload-zone mb-3">
                    <input type="file" id="csvFile" class="form-control" accept=".csv">
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="analytics.html" class="btn btn-outline-secondary">
                        Back
                    </a>
                    <button id="runScanBtn" class="btn btn-primary">
                        Run Scan
                    </button>
                </div>

            </div>
        </div>

    </div>

</main>





    <script src="js/scan.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
