<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scans History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style2.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <button class="btn btn-primary"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebar"
                aria-controls="sidebar">
                 ☰
            </button>
            <a  class="navbar-brand ms-3" href="dashboard.html">LeakTrace</a>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="offcanvas offcanvas-start bg-dark text-white"
     tabindex="-1"
     id="sidebar">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title">
            <i class="bi bi-shield-lock-fill"></i>
            <span>LeakTrace</span>
        </h5>
        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
    </div>

        <div class="offcanvas-body p-0">
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link active text-white">Dashboard</a>
                </li>
                <li>
                    <a href="scan.html" class="nav-link text-white">New Scan</a>
                </li>
                <li>
                    <a href="analytics.html" class="nav-link text-white">Analytics</a>
                </li>
                <li>
                    <a href="history.html" class="nav-link text-white">History</a>
                </li>
            </ul>
        </div>
    </div>
    
<main class="history-main">
        <!-- Header -->
        <div class="history-header px-4 py-3">
            <h5 class="mb-1">Scan History</h5>
            <p class="text-muted small mb-0">View and analyze previous credential hygiene scans </p>
        </div>
   
<br>
    <!-- Card 1: Risk Trend Chart -->
    <div class="card shadow-sm mb-4"> 
         <div class="card-body">
            <h6>Risk Trend (Last 10 Scans)</h6>
            <canvas id="riskTrendChart" height="90"></canvas>
         </div>
     </div>

     <!-- Scans History -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h6 class="mb-3">Scan History</h6>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table table-hover align-middle">
                        <tr>
                            <th>Scan Name</th>
                            <th>Date</th>
                            <th>Total</th>
                            <th class="text-danger">High</th>
                            <th class="text-success">Low</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="historyTable">
                    </tbody>
                </table>
            </div>

        </div>

    </div>
</main>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/history.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    
</body>
</html>
