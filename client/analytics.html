<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>
    <link href="style.css" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
</head>
<body>
     <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <button class="btn btn-primary"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebar"
                aria-controls="sidebar">
                 ☰
            </button>
            <a  class="navbar-brand ms-3" href="dashboard.html">LeakTrace</a>
        </div>
    </nav>

    <!-- Sidebar -->
<div class="offcanvas offcanvas-start bg-dark text-white"
     tabindex="-1"
     id="sidebar">

    <div class="offcanvas-header">
        <h5 class="offcanvas-title">
            <i class="bi bi-shield-lock-fill"></i>
            <span>LeakTrace</span>
        </h5>
        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
 </div>

    <div class="offcanvas-body p-0">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link active text-white">Dashboard</a>
            </li>
            <li>
                <a href="scan.html" class="nav-link text-white">New Scan</a>
            </li>
            <li>
                <a href="analytics.html" class="nav-link text-white">Analytics</a>
            </li>
            <li>
                <a href="history.html" class="nav-link text-white">History</a>
            </li>
        </ul>
    </div>
</div>

<br>
<div class="page-header-card post-scan-header">
    <h3>Post-Scan Results</h3>
    <p> Employee credential exposure analytics</p>
</div>

<!-- Summary Cards -->


<div class="row row-cols-1 row-cols-md-3 g-3 mb-4 postscan-summary">

    <!-- Card 1 -->
    <div class="col">
            <div class="card border-danger h-100 postscan-card">
                <div class="card-body">
                    <h6 class="text-danger fw-semibold" >High Risk Accounts</h6>
                    <h4 class="fw-bold mb-0" > 
                        <span id="highRiskCount">0</span>
                        <small class="text-muted">%</small>
                    </h4>
                </div>
        </div>
    </div>


    <!-- Card 2-->
    <div class="col">
        <div class="card h-100 postscan-card">
                <div class="card-body">
                    <h6 class="fw-semibold">Low Risk Accounts</h6>
                    <h4 class="fw-bold mb-0">
                        <span id="lowRiskCount">0</span>
                    </h4>
                </div>
        </div>
    </div>      

    <br>
    <!-- Card 3 -->
    <div class="col">
        <div class='card h-100 postscan-card'>
                <div class="card-body">
                    <h6 class=" fw-semibold" >Total Emails Scanned</h6>
                    <h4>
                        <span id="totalEmails">0</span>
                    </h4>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="btn-group" role="group">
<button
    id="goToHistoryBtn"
    class="btn btn-outline-secondary">
    View Scan History
</button>
</div>



<!-- Results Table -->

    <div class="card postscan-table">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <br>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Risk Level</th>
                        <th>Breach Source</th>
                        
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    
                </tbody>
            </table>
        </div>
    </div>
<script src="js/post-scan.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

   
</body>
</html>
